<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Prompt Builder — prompt.md generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header dl-section--featured">
    <div class="header-inner">
      <a class="brand-lockup" href="https://www.deeplearning.ai" aria-label="DeepLearning.AI">
        <img class="brand-logo" src="dlai-logo.webp" alt="DeepLearning.AI" />
      </a>
      <h1>Coding Prompt Builder</h1>
      <p>Describe what you want to build, and we'll shape it into a ready-to-use
        <code>prompt.md</code> — the starting point for your AI build plan. Options
        adapt to your project type, so you only ever see choices that fit together.</p>
    </div>
  </header>

  <main class="layout">
    <!-- The form is rendered by app.js from a config, so its options stay
         internally consistent (e.g. ORMs filter to the chosen database). -->
    <form id="spec-form" class="form" autocomplete="off"></form>

    <aside class="preview">
      <div class="preview-head">
        <h2>prompt.md preview</h2>
        <div class="actions">
          <button type="button" id="reset-btn" class="btn btn-ghost">Reset</button>
          <button type="button" id="copy-btn" class="btn">Copy</button>
          <button type="button" id="download-btn" class="btn btn-primary">Download prompt.md</button>
        </div>
      </div>
      <p id="notice" class="notice" hidden></p>
      <pre id="preview-output" class="preview-output"></pre>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
